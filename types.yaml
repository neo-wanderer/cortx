types:
  task:
    folder: "1_Projects/tasks"
    required: [type, title, status]
    fields:
      type:       { const: task }
      title:      { type: string }
      status:     { enum: [open, in_progress, waiting, done, cancelled, archived] }
      project:    { type: link, ref: project }
      area:       { type: link, ref: area }
      assignee:   { type: link, ref: person }
      created_at: { type: date }
      updated_at: { type: date }
      priority:   { type: number }
      scheduled:  { type: date }
      due:        { type: date }
      tags:       { type: "array[string]", default: "[]" }

  project:
    folder: "1_Projects"
    required: [type, title, status]
    fields:
      type:       { const: project }
      title:      { type: string }
      status:     { enum: [active, on_hold, completed, cancelled, archived] }
      area:       { type: link, ref: area }
      owner:      { type: link, ref: person }
      due:        { type: date }
      created_at: { type: date }
      updated_at: { type: date }
      tags:       { type: "array[string]", default: "[]" }

  area:
    folder: "2_Areas"
    required: [type, title, status]
    fields:
      type:       { const: area }
      title:      { type: string }
      status:     { enum: [active, archived] }
      created_at: { type: date }
      updated_at: { type: date }
      tags:       { type: "array[string]", default: "[]" }

  resource:
    folder: "3_Resources"
    required: [type, title]
    fields:
      type:       { const: resource }
      title:      { type: string }
      area:       { type: link, ref: area }
      created_at: { type: date }
      updated_at: { type: date }
      tags:       { type: "array[string]", default: "[]" }

  note:
    folder: "3_Resources/notes"
    required: [type, title]
    fields:
      type:       { const: note }
      title:      { type: string }
      area:       { type: link, ref: area }
      created_at: { type: date }
      updated_at: { type: date }
      tags:       { type: "array[string]", default: "[]" }

  person:
    folder: "5_People"
    required: [type, name]
    fields:
      type:         { const: person }
      name:         { type: string }
      relationship: { enum: [personal, professional, family, other] }
      company:      { type: link, ref: company }
      email:        { type: string }
      phone:        { type: string }
      created_at:   { type: date }
      updated_at:   { type: date }
      tags:         { type: "array[string]", default: "[]" }

  company:
    folder: "5_Companies"
    required: [type, name]
    fields:
      type:       { const: company }
      name:       { type: string }
      domain:     { type: string }
      industry:   { type: string }
      created_at: { type: date }
      updated_at: { type: date }
      tags:       { type: "array[string]", default: "[]" }
